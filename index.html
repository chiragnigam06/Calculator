<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Calculator</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="background">

        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>

    </div>

    <!-- Calculator -->
    <div class="calculator">

        <div class="heading">
            <h2>Calculator</h2>
            <p>Modern UI</p>
        </div>

        <!-- Display -->
        <div class="display-box">

            <input
                type="text"
                id="display"
                readonly
                placeholder="0">

        </div>

        <!-- Buttons -->
        <div class="buttons">

            <!-- Row 1 -->
            <button class="btn clear" onclick="clearDisplay()">C</button>

            <button class="btn operator" onclick="appendValue('/')">
                ÷
            </button>

            <button class="btn operator" onclick="appendValue('*')">
                ×
            </button>

            <button class="btn delete" onclick="deleteLast()">
                ⌫
            </button>

            <!-- Row 2 -->
            <button class="btn number" onclick="appendValue('7')">7</button>

            <button class="btn number" onclick="appendValue('8')">8</button>

            <button class="btn number" onclick="appendValue('9')">9</button>

            <button class="btn operator" onclick="appendValue('-')">
                −
            </button>

            <!-- Row 3 -->
            <button class="btn number" onclick="appendValue('4')">4</button>

            <button class="btn number" onclick="appendValue('5')">5</button>

            <button class="btn number" onclick="appendValue('6')">6</button>

            <button class="btn operator" onclick="appendValue('+')">
                +
            </button>

            <!-- Row 4 -->
            <button class="btn number" onclick="appendValue('1')">1</button>

            <button class="btn number" onclick="appendValue('2')">2</button>

            <button class="btn number" onclick="appendValue('3')">3</button>

            <button class="btn equal" onclick="calculate()">
                =
            </button>

            <!-- Row 5 -->
            <button class="btn number zero" onclick="appendValue('0')">
                0
            </button>

            <button class="btn number" onclick="appendValue('.')">
                .
            </button>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
